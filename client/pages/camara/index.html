<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 GeoBingo</title>
    <link rel="stylesheet" href="/pages/style.css">
    <link rel="stylesheet" href="/../resources/font/Nunito.css">
    <script defer src="/pages/camara/script.js" type="module"></script>
</head>

<body>
    <header class="header">
        <img src="/resources/GeoBingoLogo.png" alt="Logo" class="logo">
    </header>

    <div class="block card">
        <h1 class="centered" id="time">Time left: </h1>
    </div>

    <div class="block card">
        <h1 class="centered" id="progress"></h1>
    </div>

    <div class="block card hidden" id="bounty-panel">
        <h2 class="centered" id="bounty-phase"></h2>
        <p class="centered" id="bounty-score"></p>
        <p class="centered" id="bounty-selection-timer"></p>
        <div id="bounty-candidates"></div>
        <button class="button hidden" id="bounty-skip-button">Skip active bounty (-1)</button>
    </div>

    <div id="playerList"></div>
</body>

</html>
